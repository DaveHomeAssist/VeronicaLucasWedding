<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veronica & Lucas — Redirecting</title>
<script>
// Redirect common deep-link paths to anchor sections on the homepage
const redirects = {
  '/rsvp': '#rsvp',
  '/travel': '#details',
  '/registry': '#details',
  '/details': '#details',
  '/faq': '#faq',
  '/photos': '#gallery',
  '/gallery': '#gallery',
  '/story': '#story',
  '/schedule': '#details',
};
const path = window.location.pathname.toLowerCase().replace(/\/+$/, '');
const anchor = redirects[path];
if (anchor) {
  window.location.replace('/' + anchor);
} else {
  window.location.replace('/');
}
</script>
<style>
body {
  font-family: 'Libre Franklin', -apple-system, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
  background: #F5F0E8;
  color: #1A1A18;
}
a { color: #B8956A; }
</style>
</head>
<body>
<p>Redirecting to <a href="/">veronicaandlucas.com</a>&hellip;</p>
</body>
</html>
